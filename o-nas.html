<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O NÁS | PHASE STREETWEAR</title>
<link rel="icon" type="image/png" href="favicon.png?">
    <style>
        /* Základní reset a nastavení stránky */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Matrix pozadí */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Hlavní obsah nad plátnem */
        .content-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100dvh;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        /* Černý box se zeleným pulzujícím rámečkem a září */
        .box {
            background-color: #000; 
            border: 2px solid #0f0; 
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* Spuštění animace pulzování pro rámeček a stín */
            animation: border-pulse-glow 2s infinite alternate;
        }

        /* Animace pulzujícího rámečku a zelené záře */
        @keyframes border-pulse-glow {
            from {
                border-color: #0a0;
                box-shadow: 0 0 10px #0a0, inset 0 0 5px #0a0;
            }
            to {
                border-color: #0f0;
                box-shadow: 0 0 25px #0f0, inset 0 0 10px #0f0;
            }
        }

        /* Styl pro logo na stránce O NÁS */
        .logo-image {
            width: auto;
            max-width: 100%;
            height: auto;
            max-height: 180px;
            object-fit: contain;
            margin-bottom: 25px;
            mix-blend-mode: screen;
        }

        /* Popisný text - změněno na bílou barvu */
        p {
            color: #fff; 
            line-height: 1.6;
            margin-bottom: 35px;
            font-size: 16px;
        }

        /* Tlačítko zpět */
        .btn {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #fff;
            box-shadow: 0 0 20px #0f0;
        }
    </style>
</head>
<body>

    <!-- Plátno pro animované pozadí -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Hlavní vrstva s obsahem -->
    <div class="content-wrapper">
        <div class="box">
            <!-- Vložené logo -->
            <img src="logo.png" alt="Logo Phase" class="logo-image">
            
            <!-- Tento text bude nyní svítit bíle -->
            <p>Sem můžeš napsat svůj vlastní text o tom, co PHASE STREETWEAR reprezentuje, jaké jsou vaše cíle nebo jak značka vznikla...</p>
            <a href="index.html" class="btn">ZPĚT NA ÚVOD</a>
        </div>
    </div>

    <!-- Script pro identické matrix pozadí s animací nápisu PHASE_ -->
    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 16;
        let columns = 0, rows = 0, grid = [];

        // Proměnné pro animaci slova PHASE_
        const targetWord = "PHASE_";
        let wordRow = 0;
        let wordCol = 0;
        let wordState = 'IDLE'; 
        let revealQueue = [];
        let revealedLetters = new Set();
        let delayTimer = 0;

        // Bezpečná funkce pro zamíchání pole
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                let temp = array[currentIndex];
                array[currentIndex] = array[randomIndex];
                array[randomIndex] = temp;
            }
            return array;
        }

        // Inicializace mřížky znaků
        function initGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            columns = Math.max(1, Math.floor(canvas.width / fontSize) + 1);
            rows = Math.max(1, Math.floor(canvas.height / fontSize) + 1);
            grid = [];

            for (let i = 0; i < columns * rows; i++) {
                grid.push(letters.charAt(Math.floor(Math.random() * letters.length)));
            }
            
            wordState = 'IDLE';
            delayTimer = 20;
        }

        // Řízení stavu zobrazení slova PHASE_
        function updateWordLogic() {
            if (wordState === 'IDLE') {
                if (delayTimer > 0) {
                    delayTimer--;
                } else {
                    wordRow = Math.floor(Math.random() * rows);
                    wordCol = Math.max(0, Math.floor(Math.random() * (columns - targetWord.length)));
                    
                    revealQueue = shuffleArray([0, 1, 2, 3, 4, 5]);
                    revealedLetters.clear();
                    wordState = 'FORMING';
                    delayTimer = 4;
                }
            } else if (wordState === 'FORMING') {
                if (delayTimer > 0) {
                    delayTimer--;
                } else {
                    if (revealQueue.length > 0) {
                        revealedLetters.add(revealQueue.pop());
                        delayTimer = 4; 
                    } else {
                        wordState = 'VISIBLE';
                        delayTimer = 60; 
                    }
                }
            } else if (wordState === 'VISIBLE') {
                if (delayTimer > 0) {
                    delayTimer--;
                } else {
                    wordState = 'DISSOLVING';
                    revealQueue = shuffleArray([0, 1, 2, 3, 4, 5]);
                    delayTimer = 4;
                }
            } else if (wordState === 'DISSOLVING') {
                if (delayTimer > 0) {
                    delayTimer--;
                } else {
                    if (revealQueue.length > 0) {
                        revealedLetters.delete(revealQueue.pop());
                        delayTimer = 4; 
                    } else {
                        wordState = 'IDLE';
                        delayTimer = 30; 
                    }
                }
            }
        }

        // Vykreslování animace
        function draw() {
            if (columns === 0 || rows === 0) return;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.textBaseline = 'top';
            ctx.font = fontSize + 'px monospace';

            updateWordLogic();

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < columns; col++) {
                    const index = row * columns + col;
                    
                    let charToDraw = grid[index];
                    let isWhiteLetter = false;

                    // Kontrola zobrazení písmene z PHASE_
                    if (row === wordRow && col >= wordCol && col < wordCol + targetWord.length) {
                        let letterIndex = col - wordCol;
                        if (revealedLetters.has(letterIndex)) {
                            isWhiteLetter = true;
                            charToDraw = targetWord[letterIndex];
                        }
                    }

                    // Problikávání zeleného textu
                    if (!isWhiteLetter) {
                        if (Math.random() < 0.05) {
                            grid[index] = letters.charAt(Math.floor(Math.random() * letters.length));
                        }
                        charToDraw = grid[index];
                    }

                    // Styl vykreslení
                    if (isWhiteLetter) {
                        ctx.fillStyle = '#fff';
                        ctx.shadowColor = '#fff';
                        ctx.shadowBlur = 8;
                    } else {
                        ctx.fillStyle = '#0a0';
                        ctx.shadowBlur = 0;
                    }

                    ctx.fillText(charToDraw, col * fontSize, row * fontSize);
                }
            }
            ctx.shadowBlur = 0;
        }

        // Spuštění
        initGrid();
        setInterval(draw, 50);
        window.addEventListener('resize', initGrid);
    </script>
</body>
</html>

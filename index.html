<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHASE_STREETWEAR</title>
<link rel="icon" type="image/png" href="favicon.png?">
    <style>
        /* Základní reset a nastavení stránky */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            position: fixed;
        }

        /* Matrix pozadí - musí být pod vším */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Hlavní obsah - pevně centrovaný, nesmí přetéct přes okraj */
        .content-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        /* OBRÁZEK LEBKY - s pojistkou proti vytlačení tlačítek z obrazovky */
        .skull-image {
            width: auto;
            max-width: 80vw;
            height: auto;
            max-height: 40vh; /* Toto drží lebku na uzdě, aby nevytlačila tlačítka pryč */
            object-fit: contain;
            margin-bottom: 40px; 
            
            /* Průhlednost černé */
            mix-blend-mode: screen; 
            
            /* Zelená záře kolem bílé lebky */
            filter: drop-shadow(0 0 15px #0f0) drop-shadow(0 0 40px #0f0);
            
            /* Pomalé pulzování záře */
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { filter: drop-shadow(0 0 10px #0f0) drop-shadow(0 0 20px #0f0); }
            to { filter: drop-shadow(0 0 20px #0f0) drop-shadow(0 0 50px #0f0); }
        }

        /* Kontejner pro tlačítka */
        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        /* Tlačítka podle předlohy (upraveno i pro odkazy) */
        .btn {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            transition: all 0.2s ease;
            text-decoration: none; /* Odstraní podtržení u odkazů */
            display: inline-block;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: #fff;
            box-shadow: 0 0 20px #0f0;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="content-wrapper">
        
        <img src="skull.png" alt="Lebka Phase" class="skull-image">

        <div class="buttons">
            <a href="https://www.instagram.com/phase_streetwear/" target="_blank" class="btn">INSTAGRAM</a>
            
            <a href="o-nas.html" class="btn">O NÁS</a>            <button class="btn" onclick="alert('Připravuje se...')">SHOP</button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 16;
        let columns = 0, rows = 0, grid = [];

        // Proměnné pro animaci slova PHASE_
        const targetWord = "PHASE_";
        let wordRow = 0;
        let wordCol = 0;
        let wordState = 'IDLE'; 
        let revealQueue = [];
        let revealedLetters = new Set();
        let delayTimer = 0;

        // Bezpečná funkce pro zamíchání pole
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                let temp = array[currentIndex];
                array[currentIndex] = array[randomIndex];
                array[randomIndex] = temp;
            }
            return array;
        }

        // Inicializace mřížky znaků
        function initGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Pojistka, aby to nepadalo při nulové velikosti okna
            columns = Math.max(1, Math.floor(canvas.width / fontSize) + 1);
            rows = Math.max(1, Math.floor(canvas.height / fontSize) + 1);
            grid = [];

            for (let i = 0; i < columns * rows; i++) {
                grid.push(letters.charAt(Math.floor(Math.random() * letters.length)));
            }
            
            wordState = 'IDLE';
            delayTimer = 20;
        }

        // Řízení stavu zobrazení slova PHASE_
        function updateWordLogic() {
            if (wordState === 'IDLE') {
                if (delayTimer > 0) {
                    delayTimer--;
                } else {
                    wordRow = Math.floor(Math.random() * rows);
                    // Pojistka, aby slovo nepřeteklo přes pravý okraj plátna
                    wordCol = Math.max(0, Math.floor(Math.random() * (columns - targetWord.length)));
                    
                    revealQueue = shuffleArray([0, 1, 2, 3, 4, 5]);
                    revealedLetters.clear();
                    wordState = 'FORMING';
                    delayTimer = 4;
                }
            } else if (wordState === 'FORMING') {
                if (delayTimer > 0) {
                    delayTimer--;
                } else {
                    if (revealQueue.length > 0) {
                        revealedLetters.add(revealQueue.pop());
                        delayTimer = 4; 
                    } else {
                        wordState = 'VISIBLE';
                        delayTimer = 60; 
                    }
                }
            } else if (wordState === 'VISIBLE') {
                if (delayTimer > 0) {
                    delayTimer--;
                } else {
                    wordState = 'DISSOLVING';
                    revealQueue = shuffleArray([0, 1, 2, 3, 4, 5]);
                    delayTimer = 4;
                }
            } else if (wordState === 'DISSOLVING') {
                if (delayTimer > 0) {
                    delayTimer--;
                } else {
                    if (revealQueue.length > 0) {
                        revealedLetters.delete(revealQueue.pop());
                        delayTimer = 4; 
                    } else {
                        wordState = 'IDLE';
                        delayTimer = 30; 
                    }
                }
            }
        }

        // Vykreslování animace
        function draw() {
            if (columns === 0 || rows === 0) return; // Ochrana proti neexistujícímu plátnu

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.textBaseline = 'top';
            ctx.font = fontSize + 'px monospace';

            updateWordLogic();

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < columns; col++) {
                    const index = row * columns + col;
                    
                    let charToDraw = grid[index];
                    let isWhiteLetter = false;

                    // Kontrola zobrazení písmene z PHASE_
                    if (row === wordRow && col >= wordCol && col < wordCol + targetWord.length) {
                        let letterIndex = col - wordCol;
                        if (revealedLetters.has(letterIndex)) {
                            isWhiteLetter = true;
                            charToDraw = targetWord[letterIndex];
                        }
                    }

                    // Problikávání zeleného textu
                    if (!isWhiteLetter) {
                        if (Math.random() < 0.05) {
                            grid[index] = letters.charAt(Math.floor(Math.random() * letters.length));
                        }
                        charToDraw = grid[index];
                    }

                    // Styl vykreslení
                    if (isWhiteLetter) {
                        ctx.fillStyle = '#fff';
                        ctx.shadowColor = '#fff';
                        ctx.shadowBlur = 8;
                    } else {
                        ctx.fillStyle = '#0a0';
                        ctx.shadowBlur = 0;
                    }

                    ctx.fillText(charToDraw, col * fontSize, row * fontSize);
                }
            }
            ctx.shadowBlur = 0; // Reset
        }

        // Spuštění po načtení
        initGrid();
        setInterval(draw, 50);

        // Ochrana při tahání za velikost okna prohlížeče
        //window.addEventListener('resize', initGrid);
    </script>
</body>
</html>

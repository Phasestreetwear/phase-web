<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHASE_STREETWEAR</title>
<link rel="icon" type="image/png" href="favicon.png?">
    <style>
        /* Základní reset a nastavení stránky */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: -webkit-fill-available;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            position: fixed;
        }

        /* Matrix pozadí - musí být pod vším */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            z-index: 1;
        }

        /* Hlavní obsah - pevně centrovaný, nesmí přetéct přes okraj */
        .content-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        /* NOVÝ STYL PRO ODKAZ LEBKY */
        .skull-link {
            cursor: crosshair; /* Změní kurzor na zaměřovač při najetí */
            display: inline-block;
            margin-bottom: 40px; 
            outline: none;
        }

        /* OBRÁZEK LEBKY - s pojistkou proti vytlačení tlačítek z obrazovky */
        .skull-image {
            width: auto;
            max-width: 80vw;
            height: auto;
            max-height: 40vh; /* Toto drží lebku na uzdě, aby nevytlačila tlačítka pryč */
            object-fit: contain;
            display: block; /* Oprava zarovnání uvnitř odkazu */
            
            /* Průhlednost černé */
            mix-blend-mode: screen; 
            
            /* Zelená záře kolem bílé lebky */
            filter: drop-shadow(0 0 15px #0f0) drop-shadow(0 0 40px #0f0);
            
            /* Pomalé pulzování záře */
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { filter: drop-shadow(0 0 10px #0f0) drop-shadow(0 0 20px #0f0); }
            to { filter: drop-shadow(0 0 20px #0f0) drop-shadow(0 0 50px #0f0); }
        }

        /* Kontejner pro tlačítka */
        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        /* Tlačítka podle předlohy (upraveno i pro odkazy) */
        .btn {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            transition: all 0.2s ease;
            text-decoration: none; /* Odstraní podtržení u odkazů */
            display: inline-block;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: #fff;
            box-shadow: 0 0 20px #0f0;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="content-wrapper">
        
        <!-- Obalení lebky odkazem na tajnou podstránku s minihrou -->
        <a href="phase_01.html" class="skull-link">
            <img src="skull.png" alt="Lebka Phase" class="skull-image">
        </a>

        <div class="buttons">
            <a href="https://www.instagram.com/phase_streetwear/" target="_blank" class="btn">INSTAGRAM</a>
            
            <a href="o-mne.html" class="btn">O MNĚ</a>            
            <button class="btn" onclick="alert('Připravuje se...')">SHOP</button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        const fontSize = 16;
        let columns = 0, rows = 0, grid = [];

        // --- 1. SYSTÉM: PHASE_ ---
        const phaseWord = "PHASE_";
        let phaseRow = -1, phaseCol = -1;
        let phaseState = 'IDLE';
        let phaseQueue = [];
        let phaseRevealed = new Set();
        let phaseTimer = 20;

        // --- 2. SYSTÉM: THE_END -> IS_THE_BEGINNING ---
        const endWord = "THE_END";
        let endRow = -1, endCol = -1;
        let endQueue = [];
        let endRevealed = new Set();

        const beginWord = "IS_THE_BEGINNING";
        let beginRow = -1, beginCol = -1;
        let beginQueue = [];
        let beginRevealed = new Set();

        let sequenceState = 'IDLE'; 
        let sequenceTimer = 45; 

        // Bezpečná funkce pro zamíchání pole
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                let temp = array[currentIndex];
                array[currentIndex] = array[randomIndex];
                array[randomIndex] = temp;
            }
            return array;
        }

        // Pomocná funkce pro kontrolu překryvu řádků s rezervou rozestupu
        function isRowTooClose(rowA, rowB) {
            return Math.abs(rowA - rowB) < 2; // nápisy musí být aspoň 2 řádky od sebe
        }

        // Inicializace mřížky znaků
        function initGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            columns = Math.max(1, Math.floor(canvas.width / fontSize) + 1);
            rows = Math.max(1, Math.floor(canvas.height / fontSize) + 1);
            grid = [];

            for (let i = 0; i < columns * rows; i++) {
                grid.push(letters.charAt(Math.floor(Math.random() * letters.length)));
            }
            
            phaseState = 'IDLE';
            phaseTimer = 20;
            sequenceState = 'IDLE';
            sequenceTimer = 50;
        }

        // Logika pro samostatné zobrazení PHASE_
        function updatePhaseLogic() {
            if (phaseState === 'IDLE') {
                if (phaseTimer > 0) {
                    phaseTimer--;
                } else {
                    // Generujeme řádek tak, aby nekolidoval s běžícím THE_END nebo BEGINNING
                    let validRow = false;
                    let attempts = 0;
                    while (!validRow && attempts < 15) {
                        phaseRow = Math.floor(Math.random() * rows);
                        validRow = true;
                        if (sequenceState !== 'IDLE' && isRowTooClose(phaseRow, endRow)) validRow = false;
                        if (sequenceState !== 'IDLE' && isRowTooClose(phaseRow, beginRow)) validRow = false;
                        attempts++;
                    }

                    phaseCol = Math.max(0, Math.floor(Math.random() * (columns - phaseWord.length)));
                    
                    let indices = [];
                    for(let i = 0; i < phaseWord.length; i++) indices.push(i);
                    phaseQueue = shuffleArray(indices);
                    phaseRevealed.clear();
                    
                    phaseState = 'FORMING';
                    phaseTimer = 4;
                }
            } else if (phaseState === 'FORMING') {
                if (phaseTimer > 0) {
                    phaseTimer--;
                } else {
                    if (phaseQueue.length > 0) {
                        phaseRevealed.add(phaseQueue.pop());
                        phaseTimer = 4; 
                    } else {
                        phaseState = 'VISIBLE';
                        phaseTimer = 60; 
                    }
                }
            } else if (phaseState === 'VISIBLE') {
                if (phaseTimer > 0) {
                    phaseTimer--;
                } else {
                    let indices = [];
                    for(let i = 0; i < phaseWord.length; i++) indices.push(i);
                    phaseQueue = shuffleArray(indices);
                    phaseState = 'DISSOLVING';
                    phaseTimer = 4;
                }
            } else if (phaseState === 'DISSOLVING') {
                if (phaseTimer > 0) {
                    phaseTimer--;
                } else {
                    if (phaseQueue.length > 0) {
                        phaseRevealed.delete(phaseQueue.pop());
                        phaseTimer = 4; 
                    } else {
                        phaseState = 'IDLE';
                        phaseRow = -1; // reset pozice
                        phaseTimer = Math.floor(Math.random() * 40) + 30; 
                    }
                }
            }
        }

        // Logika pro propojenou sekvenci THE_END a IS_THE_BEGINNING
        function updateSequenceLogic() {
            if (sequenceState === 'IDLE') {
                if (sequenceTimer > 0) {
                    sequenceTimer--;
                } else {
                    // Pozice THE_END - kontrola rozestupu vůči PHASE_
                    let validEndRow = false;
                    let attempts = 0;
                    while (!validEndRow && attempts < 15) {
                        endRow = Math.floor(Math.random() * rows);
                        validEndRow = true;
                        if (phaseState !== 'IDLE' && isRowTooClose(endRow, phaseRow)) validEndRow = false;
                        attempts++;
                    }
                    endCol = Math.max(0, Math.floor(Math.random() * (columns - endWord.length)));
                    
                    let indices1 = [];
                    for(let i = 0; i < endWord.length; i++) indices1.push(i);
                    endQueue = shuffleArray(indices1);
                    endRevealed.clear();

                    // Pozice IS_THE_BEGINNING - úplně random rozptyl kdekoli jinde po obrazovce s hlídáním rozestupů
                    let validBeginRow = false;
                    attempts = 0;
                    while (!validBeginRow && attempts < 15) {
                        beginRow = Math.floor(Math.random() * rows);
                        validBeginRow = true;
                        if (isRowTooClose(beginRow, endRow)) validBeginRow = false;
                        if (phaseState !== 'IDLE' && isRowTooClose(beginRow, phaseRow)) validBeginRow = false;
                        attempts++;
                    }
                    beginCol = Math.max(0, Math.floor(Math.random() * (columns - beginWord.length)));

                    let indices2 = [];
                    for(let i = 0; i < beginWord.length; i++) indices2.push(i);
                    beginQueue = shuffleArray(indices2);
                    beginRevealed.clear();

                    sequenceState = 'FORMING_FIRST';
                    sequenceTimer = 4;
                }
            } else if (sequenceState === 'FORMING_FIRST') {
                if (sequenceTimer > 0) {
                    sequenceTimer--;
                } else {
                    if (endQueue.length > 0) {
                        endRevealed.add(endQueue.pop());
                        sequenceTimer = 4; 
                    } else {
                        sequenceState = 'VISIBLE_FIRST';
                        sequenceTimer = 60; 
                    }
                }
            } else if (sequenceState === 'VISIBLE_FIRST') {
                if (sequenceTimer > 0) {
                    sequenceTimer--;
                } else {
                    let indices1 = [];
                    for(let i = 0; i < endWord.length; i++) indices1.push(i);
                    endQueue = shuffleArray(indices1);

                    sequenceState = 'TRANSITIONING';
                    sequenceTimer = 4;
                }
            } else if (sequenceState === 'TRANSITIONING') {
                if (sequenceTimer > 0) {
                    sequenceTimer--;
                } else {
                    let changed = false;
                    if (endQueue.length > 0) {
                        endRevealed.delete(endQueue.pop());
                        changed = true;
                    }
                    if (beginQueue.length > 0) {
                        beginRevealed.add(beginQueue.pop());
                        changed = true;
                    }

                    if (changed) {
                        sequenceTimer = 4;
                    } else {
                        endRow = -1; // THE_END zmizelo, vyčistíme pozici
                        sequenceState = 'VISIBLE_SECOND';
                        sequenceTimer = 60; 
                    }
                }
            } else if (sequenceState === 'VISIBLE_SECOND') {
                if (sequenceTimer > 0) {
                    sequenceTimer--;
                } else {
                    let indices2 = [];
                    for(let i = 0; i < beginWord.length; i++) indices2.push(i);
                    beginQueue = shuffleArray(indices2);
                    sequenceState = 'DISSOLVING_SECOND';
                    sequenceTimer = 4;
                }
            } else if (sequenceState === 'DISSOLVING_SECOND') {
                if (sequenceTimer > 0) {
                    sequenceTimer--;
                } else {
                    if (beginQueue.length > 0) {
                        beginRevealed.delete(beginQueue.pop());
                        sequenceTimer = 4;
                    } else {
                        sequenceState = 'IDLE';
                        beginRow = -1; // BEGINNING zmizelo, vyčistíme pozici
                        sequenceTimer = Math.floor(Math.random() * 50) + 40; 
                    }
                }
            }
        }

        function draw() {
            if (columns === 0 || rows === 0) return;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.textBaseline = 'top';
            ctx.font = fontSize + 'px monospace';

            updatePhaseLogic();
            updateSequenceLogic();

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < columns; col++) {
                    const index = row * columns + col;
                    
                    let charToDraw = grid[index];
                    let isWhiteLetter = false;

                    // 1. PHASE_
                    if (phaseState !== 'IDLE' && row === phaseRow && col >= phaseCol && col < phaseCol + phaseWord.length) {
                        let letterIndex = col - phaseCol;
                        if (phaseRevealed.has(letterIndex)) {
                            isWhiteLetter = true;
                            charToDraw = phaseWord[letterIndex];
                        }
                    }

                    // 2. THE_END
                    if (sequenceState !== 'IDLE' && row === endRow && col >= endCol && col < endCol + endWord.length) {
                        let letterIndex = col - endCol;
                        if (endRevealed.has(letterIndex)) {
                            isWhiteLetter = true;
                            charToDraw = endWord[letterIndex];
                        }
                    }

                    // 3. IS_THE_BEGINNING
                    if (sequenceState !== 'IDLE' && row === beginRow && col >= beginCol && col < beginCol + beginWord.length) {
                        let letterIndex = col - beginCol;
                        if (beginRevealed.has(letterIndex)) {
                            isWhiteLetter = true;
                            charToDraw = beginWord[letterIndex];
                        }
                    }

                    if (!isWhiteLetter) {
                        if (Math.random() < 0.05) {
                            grid[index] = letters.charAt(Math.floor(Math.random() * letters.length));
                        }
                        charToDraw = grid[index];
                    }

                    if (isWhiteLetter) {
                        ctx.fillStyle = '#fff';
                        ctx.shadowColor = '#fff';
                        ctx.shadowBlur = 8;
                    } else {
                        ctx.fillStyle = '#0a0';
                        ctx.shadowBlur = 0;
                    }

                    ctx.fillText(charToDraw, col * fontSize, row * fontSize);
                }
            }
            ctx.shadowBlur = 0;
        }

        initGrid();
        setInterval(draw, 50);
    </script>
</body>
</html>
